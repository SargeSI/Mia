# Рабочий конфиг Reticulum для Windows (июнь 2026)
# Sideband + два публичных testnet-хаба + локальный AutoInterface
# Проверен на Windows с rns 1.3.5, lxmf 1.0.1

[reticulum]
  enable_transport = False
  share_instance = Yes
  instance_name = default

[logging]
  loglevel = 4

[interfaces]

  # Локальная сеть (WiFi / LAN) — автообнаружение
  [[Default Interface]]
    type = AutoInterface
    enabled = Yes

  # Dublin Hub — официальный testnet
  [[RNS Testnet Dublin]]
    type = TCPClientInterface
    enabled = yes
    target_host = dublin.connect.reticulum.network
    target_port = 4965

  # BetweenTheBorders — волонтёрский хаб
  [[RNS Testnet BetweenTheBorders]]
    type = TCPClientInterface
    enabled = yes
    target_host = betweentheborders.com
    target_port = 4242
